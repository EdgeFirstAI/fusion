[package]
name = "maivin-fusion"
description = "Maivin Fusion"
repository = "https://bitbucket.org/au-zone/maivin-fusion"
license = "CLOSED"
version = "0.0.0"
edition = "2021"

[profile.release]
opt-level = 3
lto = true
strip = true
debug = false

[profile.profiling]
inherits = "release"
strip = false
debug = true

[features]
model_output = []

[dependencies]
async-std = {version = "1.12", features = ["attributes"] }
cdr = "0.2"
clap = { version = "4.4", features = ["derive", "env"] }
serde = "1.0"
serde_json = "1.0"
zenoh = "0.10.0-rc"
zenoh-ros-type = { git = "https://github.com/MaivinAI/zenoh-ros-type" }
log = "0.4.20"
edgefirst-schemas = "1.1"
env_logger = "0.10"
zstd = { version = "0.13", features = ["experimental"] }
ndarray = {version ="0.16.1", features= ["rayon"] }
vaal = { git = "https://github.com/Charlie-AuZone/vaal-rs.git", branch = "EDGEAI-364" } 
deepviewrt = { git = "https://github.com/DeepViewML/deepviewrt-rs.git", branch = "main" } 
lapjv = "0.2.1"
uuid = { version = "1.11.0", features = ["v4"] }
nalgebra = "0.33.2"
