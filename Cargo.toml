[package]
name = "maivin-fusion"
description = "Maivin Fusion"
repository = "https://bitbucket.org/au-zone/maivin-fusion"
license = "CLOSED"
version = "0.0.0"
edition = "2021"

[profile.release]
opt-level = 3
lto = true
strip = true
debug = false

[profile.profiling]
inherits = "release"
strip = false
debug = true

[features]
default = ["model_output"]
model_output = []


[[bin]]
name = "maivin-fusion"
path = "src/main.rs"

[[bin]]
name = "maivin-model-test"
path = "src/test_fusion_model/main.rs"

[dependencies]
async-std = {version = "1.12", features = ["attributes"] }
cdr = "0.2"
clap = { version = "4.4", features = ["derive", "env"] }
serde = "1.0"
serde_json = "1.0"
zenoh = "0.10.0-rc"
zenoh-ros-type = { git = "https://github.com/MaivinAI/zenoh-ros-type" }
log = "0.4.20"
edgefirst-schemas = "1.1"
env_logger = "0.10"
zstd = { version = "0.13", features = ["experimental"] }
ndarray = {version ="0.16.1", features= ["rayon"] }
deepviewrt = "0.7.0"
lapjv = "0.2.1"
uuid = { version = "1.11.0", features = ["v4"] }
nalgebra = "0.33.2"
pidfd_getfd = "0.2.2"
async-pidfd = "0.1.4"
dma-buf = "0.4.0"
dma-heap = "0.4.0"
g2d-sys = {version = "1.0.0", path = "g2d-sys"}
libc = "0.2.168"
videostream = "0.9.0"
tflitec-sys = { path = "./tflitec-sys" }
